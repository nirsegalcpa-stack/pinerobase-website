server {
  listen 80;
  server_name pi-nerobase.com www.pi-nerobase.com pi-nerobase.org www.pi-nerobase.org pi-nerobase.info www.pi-nerobase.info;
  return 301 https://pi-nerobase.com$request_uri;
}
server {
  listen 443 ssl http2;
  server_name pi-nerobase.com www.pi-nerobase.com pi-nerobase.org www.pi-nerobase.org pi-nerobase.info www.pi-nerobase.info;
  ssl_certificate /etc/letsencrypt/live/pi-nerobase.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pi-nerobase.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  if ($host ~* ^www.(.*)) { return 301 https://$1$request_uri; }
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  location /_next/static/ {
    alias /var/www/pinerobase/.next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  gzip on; gzip_vary on; gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
